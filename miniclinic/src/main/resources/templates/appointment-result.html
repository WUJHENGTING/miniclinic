<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號成功 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 500px; margin: 40px auto; text-align: center; }
        .result-card { background: #F0FDFA; border: 2px solid #14B8A6; padding: 20px; border-radius: 8px; }
        h2 { color: #0D9488; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>
    </nav>
    <div class="result-card">
        <h2>掛號預約成功！</h2>
        <div style="text-align: left; display: inline-block;">
            <p><strong>病歷號：</strong> <span th:text="${appointment.patient.chartNo}"></span></p>
            <p><strong>掛號醫師：</strong> <span th:text="${appointment.doctor.name}"></span> (<span th:text="${appointment.doctor.department}"></span>)</p>
            <p><strong>日期：</strong> <span th:text="${appointment.apptDate}"></span></p>
            <p><strong>時段：</strong> <span th:text="${appointment.timeSlot}"></span></p>
        </div>
    </div>
    <br>
    <a th:href="@{/}">返回首頁</a>
</body>
</html>
